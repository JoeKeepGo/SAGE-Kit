validation_contract:
  version: 2
  policy_id: sagekit-task-dispatch-v2
  policy_sha256: 0a7c5039a1c1922dc5a2e7dabab04eae7cfa78c663bdc100779dd46a4cb8efc3
  scope: active

task_id: TASK-000
objective: Describe the observable result.
owner: validation-owner
authority:
  source: milestone entry gate or execution packet
  grant: WRITE_AUTHORIZED
  scope: TASK-000 and its allowed files and evidence
phase: triage
changed_surface: [documentation]
original_user_path: n/a
runtime_shape: documentation-only

levels:
  L0:
    status: PENDING
    evidence: []
    commands: []
    reason: initial record
  L1:
    status: N/A
    evidence: []
    commands: []
    reason: not required
  L2:
    status: N/A
    evidence: []
    commands: []
    reason: not required
  L3:
    status: N/A
    evidence: []
    commands: []
    reason: not required
  L4:
    status: N/A
    evidence: []
    commands: []
    reason: not required

artifacts:
  # Command entries include command_id, command, status, source, runner, cwd,
  # observed_at, and output_ref.
  commands: []
  files_changed: []
  api: []
  sql: []
  browser: []
  logs: []
  screenshots: []
  release: []
  ids: []

# IDs are unique CMD-* or CHECK-* values. A skipped required command reuses its
# required CMD-* ID; entries also name check, reason, owner, and follow_up.
skipped_checks: []

# Run entries use the task.runs shape and canonical status values.
runs: []

blockers: []

conclusion:
  status: PENDING
  highest_level: none
  review_result: PENDING
  mock_used: false
  mock_rationale: null
  mock_scope: null
  mock_follow_up: null
  mock_accepted_by: null
  accepted_fallback: false
  accepted_fallback_by: null
  accepted_fallback_scope: null
  accepted_fallback_reason: null
  mock_acceptance_ref: null
  next_action: define scope
