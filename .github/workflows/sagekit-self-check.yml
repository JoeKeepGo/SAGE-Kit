name: SAGE-Kit self-check

on:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: sagekit-self-check-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  self-check:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Run unittest suite
        run: python -B -m unittest discover -s tests

      - name: Run CLI help smoke
        run: |
          python -B -m sagekit --help
          python -B -m sagekit --version
          python -B -m sagekit check --help
          python -B -m sagekit init --help
          python -B -m sagekit doctor --help

      - name: Run source repository check
        run: python -B -m sagekit check --source-repo
