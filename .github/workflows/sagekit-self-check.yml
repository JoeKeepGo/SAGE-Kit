name: SAGE-Kit self-check

on:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: sagekit-self-check-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  focused:
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - name: Check out repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - name: Run serial focused lane
        run: python -B scripts/run_tests.py focused --repository .

  unit:
    needs: focused
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - name: Check out repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - name: Run serial unit lane
        run: python -B scripts/run_tests.py unit --repository .

  integration:
    needs: unit
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - name: Check out repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Run serial integration lane
        run: python -B scripts/run_tests.py integration --repository .

  package-process-resource-smoke:
    needs: integration
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - name: Check out repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install package build capability
        run: python -m pip install "setuptools>=68"
      - name: Run source-repository check once
        if: matrix.os == 'ubuntu-latest'
        run: python -B scripts/run_tests.py source-repo --repository .
      - name: Run package and outside-source smoke
        run: python -B scripts/run_tests.py package --repository .
      - name: Run Claude Code hook tests
        if: matrix.os == 'ubuntu-latest'
        run: bash tests/test_claude_hooks.sh
      - name: Run Claude Code hook tests (PowerShell)
        if: matrix.os == 'windows-latest'
        run: |
          pwsh -File tests/test_claude_hooks.ps1
          powershell -File tests/test_claude_hooks.ps1
